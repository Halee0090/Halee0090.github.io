<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Job Scraper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>🔥 Job Scraper</h1>

    <!-- 검색창 -->
    <form action="/search" method="get">
        <input type="text" name="term" placeholder="검색어 입력 (python, java 등)" required>
        <button type="submit">검색</button>
    </form>

    <hr>

    <!-- 결과 -->
    {% if jobs %}
        <ul>
            {% for job in jobs %}
                <li>
                    <a href="{{ job.link }}" target="_blank">
                        <strong>[{{ job.site }}]</strong> {{ job.title }}
                    </a>
                    - {{ job.company }}
                </li>
            {% endfor %}
        </ul>
    {% elif term %}
        <p>검색 결과가 없습니다.</p>
    {% endif %}
</body>
</html>
